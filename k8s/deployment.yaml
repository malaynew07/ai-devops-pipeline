apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-deployment
  namespace: agentic-devops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: web-app-container
        image: malaynew07/ai-devops-app:latest  # Hardcoded to latest
        imagePullPolicy: Always                 # This is the key!
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-app-service
  namespace: agentic-devops
spec:
  type: NodePort
  selector:
    app: web-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
